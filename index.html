<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Oficina</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input[type="text"], select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .checkbox-group { margin-top: 10px; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; margin-top: 20px; cursor: pointer; }
        button:hover { background-color: #218838; }
        #resultado { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 4px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="nome-oficina">Carregando Oficina...</h2>

    <label>Nome do Cliente</label>
    <input type="text" id="cliente" placeholder="Nome">

    <label>Veículo</label>
    <input type="text" id="veiculo" placeholder="Modelo do carro">

    <label>Serviço Principal</label>
    <select id="servicoBase">
        <option value="motor">Reparo de Motor (R$ 1500)</option>
        <option value="suspensao">Reparo de Suspensão (R$ 800)</option>
    </select>

    <label>Adicionais</label>
    <div class="checkbox-group">
        <input type="checkbox" id="oleo" value="oleo"> Troca de Óleo (+ R$ 180)<br>
        <input type="checkbox" id="lavagem" value="lavagem"> Lavagem Completa (+ R$ 70)
    </div>

    <button onclick="enviarOrdem()">Gerar Ordem de Serviço</button>

    <div id="resultado"></div>
</div>

<script>
    window.onload = async function() {
        try {
            const response = await fetch('http://localhost:8000/api/info');
            const data = await response.json();
            document.getElementById('nome-oficina').innerText = data.oficina;
        } catch (error) {
            console.error("Erro ao carregar dados iniciais:", error);
        }
    };

    async function enviarOrdem() {
        const cliente = document.getElementById('cliente').value;
        const veiculo = document.getElementById('veiculo').value;
        const servicoBase = document.getElementById('servicoBase').value;
        
        const adicionais = [];
        if (document.getElementById('oleo').checked) adicionais.push('oleo');
        if (document.getElementById('lavagem').checked) adicionais.push('lavagem');

        const payload = {
            nome_cliente: cliente,
            veiculo: veiculo,
            servico_base: servicoBase,
            adicionais: adicionais
        };

        try {
            const response = await fetch('http://localhost:8000/api/ordem-servico', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            const divResultado = document.getElementById('resultado');
            divResultado.style.display = 'block';
            divResultado.innerHTML = `
                <h3>Fatura Gerada</h3>
                <p><strong>Descrição:</strong> ${data.servico_realizado}</p>
                <p><strong>Total:</strong> R$ ${data.total_pagar.toFixed(2)}</p>
                <hr>
                <h4>Status Observer:</h4>
                <ul>
                    ${data.notificacoes_enviadas.map(msg => `<li>${msg}</li>`).join('')}
                </ul>
            `;
        } catch (error) {
            console.error("Erro ao processar OS:", error);
        }
    }
</script>

</body>
</html>
